name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages deployment needs id-token (OIDC) + pages write. contents:read is
# enough for checkout.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build once (pulling LFS media) and deploy to GitHub Pages.
  build:
    runs-on: ubuntu-latest
    steps:
      # lfs: true so the real media binaries (mp4/gif/png) are pulled,
      # not just LFS pointer files. Vite copies them into dist/.
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Lint is informational (the codebase carries pre-existing
      # warnings), so it never blocks a deploy. The real gate is the
      # build below: a build failure fails the job.
      - name: Lint (non-blocking)
        run: npm run lint
        continue-on-error: true

      - name: Build
        env:
          # Absolute base URL of the API Space. Set as a GitHub
          # repository variable (Settings -> Variables). Empty falls
          # back to relative /api (only works behind a proxy).
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
        run: npm run build

      # Assemble the deploy payload for GitHub Pages:
      # - 404.html SPA fallback (GitHub Pages serves it on unknown routes)
      # - CNAME for the GitHub Pages custom domain, only when the
      #   PAGES_CNAME repo variable is set (Settings -> Variables).
      - name: Assemble deploy payload
        env:
          PAGES_CNAME: ${{ vars.PAGES_CNAME }}
        run: |
          cp dist/index.html dist/404.html
          if [ -n "$PAGES_CNAME" ]; then
            echo "$PAGES_CNAME" > dist/CNAME
          fi

      # Pages artifact consumed by deploy-pages below.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
