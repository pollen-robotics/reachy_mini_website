name: Deploy to HF Space

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-hf-space
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Lint is informational (the codebase carries pre-existing
      # warnings), so it never blocks a deploy. The real gate is the
      # build below: a build failure fails the job.
      - name: Lint (non-blocking)
        run: npm run lint
        continue-on-error: true
      - name: Build
        env:
          # Absolute base URL of the API Space. Set as a GitHub
          # repository variable (Settings -> Variables). Empty falls
          # back to relative /api (only works behind a proxy).
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
        run: npm run build

      # Assemble the Space payload: built assets + Space README
      # (frontmatter) + a 404.html SPA fallback + the LFS attributes
      # so large media (mp4/gif/png) commit through git-lfs.
      - name: Assemble deploy payload
        run: |
          cp README.md dist/README.md
          cp .gitattributes dist/.gitattributes
          cp dist/index.html dist/404.html

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd dist
          git init -b main
          git lfs install --local
          git config user.email "ci@github-actions"
          git config user.name "github-actions"
          git add -A
          git commit -m "Deploy ${GITHUB_SHA::7}"
          # Token auth: the username part of the URL is ignored by HF,
          # only HF_TOKEN authenticates. Space target is fixed.
          git push --force "https://pollen-robotics:${HF_TOKEN}@huggingface.co/spaces/pollen-robotics/reachy-mini-website.git" main
